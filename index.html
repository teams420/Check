<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt House - Admin Analytics</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#0b0f19', darkCard: '#111827', lightBg: '#f8fafc', lightCard: '#ffffff' } } }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.5.25/jsrsasign-all-min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease, color 0.3s ease; }
        #mobile-menu { transition: max-height 0.3s ease, opacity 0.3s ease; max-height: 0; opacity: 0; overflow: hidden; }
        #mobile-menu.open { max-height: 300px; opacity: 1; }
    </style>
</head>
<body class="bg-lightBg dark:bg-darkBg text-slate-800 dark:text-slate-200 min-h-screen">

    <div id="setup-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-lightCard dark:bg-darkCard w-full max-w-md p-8 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800">
            <div class="text-center mb-8">
                <div class="w-14 h-14 rounded-xl bg-blue-500/10 flex items-center justify-center mx-auto mb-4 border border-blue-500/20">
                    <i class="ph ph-database text-3xl text-blue-500"></i>
                </div>
                <h2 class="text-2xl font-bold">Prompt House</h2>
                <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Direct HTML GA4 API Connect</p>
            </div>

            <form id="connect-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium mb-2">GA4 Property ID</label>
                    <input type="text" id="property-id" required placeholder="e.g. 542409466" 
                           class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Service Account JSON</label>
                    <textarea id="json-config" required rows="5" placeholder='Paste full JSON text here...'
                              class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:border-blue-500 outline-none text-xs font-mono"></textarea>
                </div>
                <button type="submit" id="submit-btn" class="w-full py-3.5 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-medium flex justify-center items-center gap-2 mt-2">
                    Connect Live Data <i class="ph ph-plug"></i>
                </button>
            </form>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden max-w-7xl mx-auto p-4 md:p-8">
        
        <nav class="bg-lightCard dark:bg-darkCard px-6 py-4 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 mb-8 flex flex-col md:flex-row md:items-center justify-between">
            <div class="flex justify-between items-center w-full md:w-auto">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-lg bg-gradient-to-tr from-blue-600 to-cyan-500 flex items-center justify-center shadow-lg"><i class="ph ph-house text-white text-xl"></i></div>
                    <h1 class="text-xl font-bold">Prompt House</h1>
                </div>
                <div class="flex items-center gap-3 md:hidden">
                    <button id="mobile-theme-toggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300"><i class="ph ph-moon text-lg" id="mobile-theme-icon"></i></button>
                    <button id="mobile-menu-btn" class="p-2"><i class="ph ph-list text-2xl"></i></button>
                </div>
            </div>

            <div id="mobile-menu" class="md:hidden flex flex-col gap-4 mt-4 text-sm font-medium border-t border-slate-100 dark:border-slate-800 pt-4">
                <span class="text-blue-500">Overview</span>
                <span class="text-emerald-500">API Live Sync</span>
            </div>
            
            <div class="hidden md:flex items-center gap-6 text-sm font-medium text-slate-500 dark:text-slate-400">
                <a href="#" class="text-blue-600 dark:text-blue-400">Overview</a>
                <button id="desktop-theme-toggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700">
                    <i class="ph ph-moon text-lg text-slate-600 dark:text-slate-300" id="desktop-theme-icon"></i>
                </button>
                <div class="flex items-center gap-2 bg-emerald-500/10 px-3 py-1.5 rounded-full">
                    <span class="relative flex h-2 w-2"><span class="animate-ping absolute h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative rounded-full h-2 w-2 bg-emerald-500"></span></span>
                    <span class="text-xs text-emerald-600 dark:text-emerald-400 font-bold">Live API</span>
                </div>
            </div>
        </nav>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
            <div class="bg-lightCard dark:bg-darkCard p-6 rounded-xl border border-slate-200 dark:border-slate-800">
                <div class="flex justify-between items-start"><p class="text-slate-500 text-sm font-semibold uppercase">Active Users (Live)</p><i class="ph ph-users text-blue-500 text-xl bg-blue-500/10 p-2 rounded-lg"></i></div>
                <h2 id="stat-active-users" class="text-4xl font-bold mt-4 text-slate-800 dark:text-white">0</h2>
            </div>
            <div class="bg-lightCard dark:bg-darkCard p-6 rounded-xl border border-slate-200 dark:border-slate-800">
                <div class="flex justify-between items-start"><p class="text-slate-500 text-sm font-semibold uppercase">Screen Views (7 Days)</p><i class="ph ph-device-mobile text-purple-500 text-xl bg-purple-500/10 p-2 rounded-lg"></i></div>
                <h2 id="stat-screen-views" class="text-4xl font-bold mt-4 text-slate-800 dark:text-white">0</h2>
            </div>
        </div>

        <div class="bg-lightCard dark:bg-darkCard p-6 rounded-xl border border-slate-200 dark:border-slate-800 w-full">
            <h3 class="font-semibold text-slate-800 dark:text-white mb-6">Traffic Trend</h3>
            <div class="relative w-full h-[250px]"><canvas id="trafficChart"></canvas></div>
        </div>
    </div>

    <script>
        // --- JWT & GOOGLE API LOGIC (PURE HTML/JS) ---
        async function getGoogleAccessToken(jsonText) {
            try {
                const credentials = JSON.parse(jsonText);
                const header = { alg: 'RS256', typ: 'JWT' };
                const now = Math.floor(Date.now() / 1000);
                const claim = {
                    iss: credentials.client_email,
                    scope: 'https://www.googleapis.com/auth/analytics.readonly',
                    aud: 'https://oauth2.googleapis.com/token',
                    exp: now + 3600,
                    iat: now
                };
                
                // Sign JWT using pure JS
                const sHeader = JSON.stringify(header);
                const sClaim = JSON.stringify(claim);
                const token = KJUR.jws.JWS.sign('RS256', sHeader, sClaim, credentials.private_key);

                // Fetch Access Token from Google
                const response = await fetch('https://oauth2.googleapis.com/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${token}`
                });
                
                const data = await response.json();
                if(!data.access_token) throw new Error("Google blocked the token request. Check JSON.");
                return data.access_token;
            } catch (error) {
                console.error(error);
                throw new Error("Invalid JSON File or Format.");
            }
        }

        async function fetchGA4Data(propertyId, accessToken) {
            // 1. Fetch Realtime Users
            const rtResponse = await fetch(`https://analyticsdata.googleapis.com/v1beta/properties/${propertyId}:runRealtimeReport`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ metrics: [{ name: 'activeUsers' }] })
            });
            const rtData = await rtResponse.json();
            const activeUsers = (rtData.rows && rtData.rows.length > 0) ? rtData.rows[0].metricValues[0].value : 0;

            // 2. Fetch Screen Views (7 Days)
            const viewResponse = await fetch(`https://analyticsdata.googleapis.com/v1beta/properties/${propertyId}:runReport`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    dateRanges: [{ startDate: '7daysAgo', endDate: 'today' }],
                    metrics: [{ name: 'screenPageViews' }]
                })
            });
            const viewData = await viewResponse.json();
            const screenViews = (viewData.rows && viewData.rows.length > 0) ? viewData.rows[0].metricValues[0].value : 0;

            return { activeUsers, screenViews };
        }

        // --- FORM SUBMIT LOGIC ---
        const loginForm = document.getElementById('connect-form');
        const setupScreen = document.getElementById('setup-screen');
        const dashboardScreen = document.getElementById('dashboard-screen');
        const submitBtn = document.getElementById('submit-btn');

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault(); 
            const propertyId = document.getElementById('property-id').value;
            const jsonConfig = document.getElementById('json-config').value;

            const originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = 'Connecting to Google... <i class="ph ph-spinner animate-spin"></i>';

            try {
                // Generate Token & Fetch Data entirely in browser
                const accessToken = await getGoogleAccessToken(jsonConfig);
                const ga4Data = await fetchGA4Data(propertyId, accessToken);

                // Update UI
                document.getElementById('stat-active-users').innerText = ga4Data.activeUsers;
                document.getElementById('stat-screen-views').innerText = ga4Data.screenViews;
                
                setupScreen.classList.add('hidden');
                dashboardScreen.classList.remove('hidden');
                renderChart();

            } catch (error) {
                alert("Error: " + error.message);
                submitBtn.innerHTML = originalBtnText;
            }
        });

        // --- THEME TOGGLE & UI LOGIC ---
        document.getElementById('mobile-menu-btn').addEventListener('click', () => {
            document.getElementById('mobile-menu').classList.toggle('open');
        });

        const toggleTheme = () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            const icon = isDark ? 'ph-moon' : 'ph-sun';
            document.getElementById('desktop-theme-icon').className = `ph ${icon} text-lg text-slate-600 dark:text-slate-300`;
            document.getElementById('mobile-theme-icon').className = `ph ${icon} text-lg`;
        };
        document.getElementById('desktop-theme-toggle').addEventListener('click', toggleTheme);
        document.getElementById('mobile-theme-toggle').addEventListener('click', toggleTheme);

        function renderChart() {
            const ctx = document.getElementById('trafficChart').getContext('2d');
            if(window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Day 1', 'Day 2', 'Day 3', 'Day 4', 'Day 5', 'Day 6', 'Day 7'],
                    datasets: [{ label: 'Traffic', data: [50, 120, 90, 150, 130, 200, 250], borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.4 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { display: false } } }
            });
        }
    </script>
</body>
</html>
