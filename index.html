<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt House - Admin Analytics</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Enables class-based dark mode switching
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0b0f19',
                        darkCard: '#111827',
                        lightBg: '#f8fafc',
                        lightCard: '#ffffff'
                    }
                }
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        #mobile-menu {
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        #mobile-menu.open {
            max-height: 300px;
            opacity: 1;
        }
    </style>
</head>
<body class="bg-lightBg dark:bg-darkBg text-slate-800 dark:text-slate-200 min-h-screen">

    <div id="setup-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-lightCard dark:bg-darkCard w-full max-w-md p-8 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 transition-colors">
            
            <div class="text-center mb-8">
                <div class="w-14 h-14 rounded-xl bg-blue-500/10 flex items-center justify-center mx-auto mb-4 border border-blue-500/20">
                    <i class="ph ph-database text-3xl text-blue-500"></i>
                </div>
                <h2 class="text-2xl font-bold tracking-tight">Prompt House</h2>
                <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Connect Node.js / GA4 API</p>
            </div>

            <form id="connect-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium mb-2">GA4 Property ID</label>
                    <input type="text" id="property-id" required placeholder="e.g. 542409466" 
                           class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Firebase / Node.js Config (JSON)</label>
                    <textarea id="json-config" required rows="5" placeholder='Paste your Google Service Account JSON text here...'
                              class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors text-xs font-mono"></textarea>
                </div>

                <button type="submit" id="submit-btn" class="w-full py-3.5 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-medium transition-colors flex justify-center items-center gap-2 mt-2 shadow-lg shadow-blue-500/30">
                    Connect Live Data <i class="ph ph-plug"></i>
                </button>
            </form>
        </div>
    </div>


    <div id="dashboard-screen" class="hidden max-w-7xl mx-auto p-4 md:p-8">
        
        <nav class="bg-lightCard dark:bg-darkCard px-6 py-4 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 mb-8 flex flex-col md:flex-row md:items-center justify-between transition-colors">
            
            <div class="flex justify-between items-center w-full md:w-auto">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-lg bg-gradient-to-tr from-blue-600 to-cyan-500 flex items-center justify-center shadow-lg">
                        <i class="ph ph-house text-white text-xl"></i>
                    </div>
                    <h1 class="text-xl font-bold tracking-tight">Prompt House</h1>
                </div>
                
                <div class="flex items-center gap-3 md:hidden">
                    <button id="mobile-theme-toggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300">
                        <i class="ph ph-moon text-lg" id="mobile-theme-icon"></i>
                    </button>
                    <button id="mobile-menu-btn" class="p-2 text-slate-600 dark:text-slate-300 focus:outline-none">
                        <i class="ph ph-list text-2xl"></i>
                    </button>
                </div>
            </div>

            <div id="mobile-menu" class="md:hidden flex flex-col gap-4 mt-4 text-sm font-medium text-slate-500 dark:text-slate-400 border-t border-slate-100 dark:border-slate-800 pt-4">
                <a href="#" class="text-blue-600 dark:text-blue-400 font-semibold">Overview</a>
                <a href="#" class="hover:text-slate-800 dark:hover:text-white transition">Real-time</a>
                <a href="#" class="hover:text-slate-800 dark:hover:text-white transition">Events Logs</a>
                <div class="flex items-center gap-2 mt-2 bg-emerald-500/10 px-3 py-1.5 rounded-full w-fit">
                    <span class="relative flex h-2 w-2"><span class="animate-ping absolute h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative rounded-full h-2 w-2 bg-emerald-500"></span></span>
                    <span class="text-xs text-emerald-600 dark:text-emerald-400">Node.js Sync Active</span>
                </div>
            </div>
            
            <div class="hidden md:flex items-center gap-6 text-sm font-medium text-slate-500 dark:text-slate-400">
                <a href="#" class="text-blue-600 dark:text-blue-400 font-semibold">Overview</a>
                <a href="#" class="hover:text-slate-800 dark:hover:text-white transition">Real-time</a>
                <a href="#" class="hover:text-slate-800 dark:hover:text-white transition">Events Logs</a>
                <div class="h-4 w-px bg-slate-300 dark:bg-slate-700"></div>
                
                <button id="desktop-theme-toggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition">
                    <i class="ph ph-moon text-lg text-slate-600 dark:text-slate-300" id="desktop-theme-icon"></i>
                </button>

                <div class="flex items-center gap-2 bg-emerald-500/10 px-3 py-1.5 rounded-full">
                    <span class="relative flex h-2 w-2"><span class="animate-ping absolute h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative rounded-full h-2 w-2 bg-emerald-500"></span></span>
                    <span class="text-xs text-emerald-600 dark:text-emerald-400 font-bold">Live API</span>
                </div>
            </div>
        </nav>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
            
            <div class="bg-lightCard dark:bg-darkCard p-6 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
                <div class="flex justify-between items-start">
                    <p class="text-slate-500 dark:text-slate-400 text-sm font-semibold uppercase tracking-wider">Active Users (Live)</p>
                    <i class="ph ph-users text-blue-500 text-xl bg-blue-500/10 p-2 rounded-lg"></i>
                </div>
                <h2 id="stat-active-users" class="text-4xl font-bold mt-4 text-slate-800 dark:text-white">0</h2>
            </div>

            <div class="bg-lightCard dark:bg-darkCard p-6 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
                <div class="flex justify-between items-start">
                    <p class="text-slate-500 dark:text-slate-400 text-sm font-semibold uppercase tracking-wider">Screen Views (7 Days)</p>
                    <i class="ph ph-device-mobile text-purple-500 text-xl bg-purple-500/10 p-2 rounded-lg"></i>
                </div>
                <h2 id="stat-screen-views" class="text-4xl font-bold mt-4 text-slate-800 dark:text-white">0</h2>
            </div>

            <div class="bg-lightCard dark:bg-darkCard p-6 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
                <div class="flex justify-between items-start">
                    <p class="text-slate-500 dark:text-slate-400 text-sm font-semibold uppercase tracking-wider">Prompt Copies</p>
                    <i class="ph ph-copy text-amber-500 text-xl bg-amber-500/10 p-2 rounded-lg"></i>
                </div>
                <h2 class="text-4xl font-bold mt-4 text-slate-800 dark:text-white">...</h2> 
            </div>

            <div class="bg-lightCard dark:bg-darkCard p-6 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
                <div class="flex justify-between items-start">
                    <p class="text-slate-500 dark:text-slate-400 text-sm font-semibold uppercase tracking-wider">System Status</p>
                    <i class="ph ph-check-circle text-emerald-500 text-xl bg-emerald-500/10 p-2 rounded-lg"></i>
                </div>
                <h2 class="text-2xl font-bold mt-4 text-slate-800 dark:text-white text-emerald-500">Connected</h2>
            </div>

        </div>

        <div class="bg-lightCard dark:bg-darkCard p-6 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm mb-6 w-full">
            <h3 class="font-semibold text-slate-800 dark:text-white mb-6">Traffic Trend</h3>
            <div class="relative w-full h-[250px]">
                <canvas id="trafficChart"></canvas>
            </div>
        </div>

    </div>

    <script>
        // --- 1. LOGIN TO DASHBOARD FLOW (REAL NODE.JS FETCH) ---
        const loginForm = document.getElementById('connect-form');
        const setupScreen = document.getElementById('setup-screen');
        const dashboardScreen = document.getElementById('dashboard-screen');
        const submitBtn = document.getElementById('submit-btn');

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault(); 
            
            const propertyId = document.getElementById('property-id').value;
            const jsonConfig = document.getElementById('json-config').value;

            // Change button text to show loading
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = 'Connecting... <i class="ph ph-spinner animate-spin"></i>';

            try {
                // Call Node.js Backend (Make sure server.js is running on port 3000)
                const response = await fetch('http://localhost:3000/api/connect-ga4', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ propertyId, jsonConfig })
                });

                const result = await response.json();

                if (result.success) {
                    // Hide login, show dashboard
                    setupScreen.classList.add('hidden');
                    dashboardScreen.classList.remove('hidden');
                    
                    // Push Real Data to UI
                    document.getElementById('stat-active-users').innerText = result.data.activeUsers;
                    document.getElementById('stat-screen-views').innerText = result.data.screenViews;
                    
                    // Render Chart
                    renderChart();
                } else {
                    alert("Connection Error: " + result.message);
                    submitBtn.innerHTML = originalBtnText;
                }
            } catch (error) {
                alert("Backend Error! Is your Node.js (server.js) running on localhost:3000?");
                submitBtn.innerHTML = originalBtnText;
            }
        });

        // --- 2. MOBILE MENU TOGGLE ---
        const menuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        
        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('open');
        });

        // --- 3. THEME TOGGLE LOGIC (Light / Dark Mode) ---
        const htmlElement = document.documentElement;
        const desktopThemeBtn = document.getElementById('desktop-theme-toggle');
        const desktopThemeIcon = document.getElementById('desktop-theme-icon');
        const mobileThemeBtn = document.getElementById('mobile-theme-toggle');
        const mobileThemeIcon = document.getElementById('mobile-theme-icon');

        function toggleTheme() {
            htmlElement.classList.toggle('dark');
            const isDark = htmlElement.classList.contains('dark');
            
            // Switch Icons
            const iconClass = isDark ? 'ph-moon' : 'ph-sun';
            desktopThemeIcon.className = `ph ${iconClass} text-lg text-slate-600 dark:text-slate-300`;
            mobileThemeIcon.className = `ph ${iconClass} text-lg`;
        }

        desktopThemeBtn.addEventListener('click', toggleTheme);
        mobileThemeBtn.addEventListener('click', toggleTheme);

        // --- 4. CHART.JS RENDERING ---
        function renderChart() {
            const trafficCtx = document.getElementById('trafficChart').getContext('2d');
            
            if(window.myChart) { window.myChart.destroy(); }

            window.myChart = new Chart(trafficCtx, {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        label: 'Active Users',
                        data: [320, 450, 410, 680, 590, 850, 920], // This can also be dynamic later
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 2,
                        pointBackgroundColor: '#3b82f6',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: 'rgba(156, 163, 175, 0.1)' }, border: { display: false } },
                        x: { grid: { display: false }, border: { display: false } }
                    }
                }
            });
        }
    </script>
</body>
  </html>
